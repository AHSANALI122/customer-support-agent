<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Upload Policy</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-start justify-center pt-16 px-4">
  <div class="bg-white rounded-xl shadow p-8 w-full max-w-md">
    <h1 class="text-2xl font-bold text-gray-800 mb-1">Policy Document Upload</h1>
    <p class="text-sm text-gray-500 mb-6">Upload a PDF to add it to the knowledge base. It will be ingested immediately.</p>

    <label class="block text-sm font-medium text-gray-700 mb-1">Admin Token</label>
    <input id="token" type="password" placeholder="X-Admin-Token"
           class="border border-gray-300 rounded-lg px-3 py-2 w-full mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" />

    <label class="block text-sm font-medium text-gray-700 mb-1">PDF File</label>
    <input id="file" type="file" accept=".pdf"
           class="border border-gray-300 rounded-lg px-3 py-2 w-full mb-6 text-sm text-gray-600
                  file:mr-3 file:py-1 file:px-3 file:rounded file:border-0
                  file:text-sm file:font-medium file:bg-blue-50 file:text-blue-700
                  hover:file:bg-blue-100" />

    <button id="btn" onclick="upload()"
            class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-4 py-2 rounded-lg w-full transition-colors">
      Upload &amp; Ingest
    </button>

    <div id="status" class="mt-4 hidden rounded-lg px-4 py-3 text-sm"></div>
  </div>

  <script>
    async function upload() {
      const token = document.getElementById('token').value.trim();
      const fileInput = document.getElementById('file');
      const file = fileInput.files[0];
      const btn = document.getElementById('btn');
      const status = document.getElementById('status');

      status.className = 'mt-4 hidden rounded-lg px-4 py-3 text-sm';
      status.textContent = '';

      if (!token) { showStatus('error', 'Admin token is required.'); return; }
      if (!file)  { showStatus('error', 'Please select a PDF file.'); return; }

      btn.disabled = true;
      btn.textContent = 'Uploading…';

      const form = new FormData();
      form.append('file', file);

      try {
        const res = await fetch('/admin/knowledge-base/upload', {
          method: 'POST',
          headers: { 'X-Admin-Token': token },
          body: form,
        });
        const data = await res.json();
        if (res.ok) {
          showStatus('success', `Saved as "${data.saved_as}" and ingested successfully.`);
          fileInput.value = '';
        } else {
          showStatus('error', data.detail ?? 'Upload failed.');
        }
      } catch {
        showStatus('error', 'Network error — is the server running?');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Upload & Ingest';
      }
    }

    function showStatus(type, message) {
      const el = document.getElementById('status');
      el.textContent = message;
      el.className = 'mt-4 rounded-lg px-4 py-3 text-sm ' + (
        type === 'success'
          ? 'bg-green-50 text-green-800 border border-green-200'
          : 'bg-red-50 text-red-800 border border-red-200'
      );
    }
  </script>
</body>
</html>
