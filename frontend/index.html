<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Support</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-2xl bg-white rounded-2xl shadow-lg flex flex-col" style="height: 90vh;">

    <!-- Header -->
    <div class="bg-blue-600 text-white px-6 py-4 rounded-t-2xl flex-shrink-0">
      <h1 class="text-xl font-semibold">Customer Support</h1>
      <p class="text-blue-200 text-sm">Ask about your orders, returns, and store policies</p>
    </div>

    <!-- Email field -->
    <div class="px-4 py-3 border-b border-gray-200 flex-shrink-0">
      <input
        id="email-input"
        type="email"
        placeholder="Email used for your order"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
      />
    </div>

    <!-- Message list -->
    <div id="messages" class="flex-1 overflow-y-auto px-4 py-4 space-y-3">
      <!-- Pre-rendered welcome bubble -->
      <div class="flex justify-start">
        <div class="bg-gray-100 text-gray-800 rounded-2xl rounded-tl-sm px-4 py-3 max-w-[80%] text-sm leading-relaxed">
          Hello! How can I help you today? You can ask about your orders, refunds, tracking, or our store policies.
        </div>
      </div>
    </div>

    <!-- Loading indicator (hidden by default) -->
    <div id="loading" class="hidden px-4 pb-2 flex-shrink-0">
      <div class="flex justify-start">
        <div class="bg-gray-100 text-gray-500 rounded-2xl rounded-tl-sm px-4 py-3 text-sm flex items-center gap-2">
          <span class="flex gap-1 items-center">
            <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0ms"></span>
            <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 150ms"></span>
            <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 300ms"></span>
          </span>
          <span id="thinking-text">Thinking&hellip;</span>
        </div>
      </div>
    </div>

    <!-- Input row -->
    <div class="border-t border-gray-200 px-4 py-3 flex gap-2 flex-shrink-0">
      <input
        id="message-input"
        type="text"
        placeholder="Type your message…"
        class="flex-1 border border-gray-300 rounded-full px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
      />
      <button
        id="send-btn"
        class="bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 disabled:cursor-not-allowed text-white rounded-full px-5 py-2 text-sm font-medium transition-colors"
      >
        Send
      </button>
    </div>

  </div>

  <script>
    let sessionId = null;

    const messagesEl   = document.getElementById('messages');
    const loadingEl    = document.getElementById('loading');
    const messageInput = document.getElementById('message-input');
    const sendBtn      = document.getElementById('send-btn');
    const emailInput   = document.getElementById('email-input');

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function appendMessage(role, text) {
      const isUser = role === 'user';
      const wrapper = document.createElement('div');
      wrapper.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;

      const bubble = document.createElement('div');
      bubble.className = isUser
        ? 'bg-blue-600 text-white rounded-2xl rounded-tr-sm px-4 py-3 max-w-[80%] text-sm leading-relaxed'
        : 'bg-gray-100 text-gray-800 rounded-2xl rounded-tl-sm px-4 py-3 max-w-[80%] text-sm leading-relaxed';
      bubble.textContent = text;

      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      scrollToBottom();
    }

    const thinkingTextEl = document.getElementById('thinking-text');

    function setLoading(isLoading) {
      loadingEl.classList.toggle('hidden', !isLoading);
      sendBtn.disabled      = isLoading;
      messageInput.disabled = isLoading;
      if (isLoading) {
        thinkingTextEl.textContent = 'Thinking…';
        scrollToBottom();
      }
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      const email = emailInput.value.trim() || null;
      messageInput.value = '';
      appendMessage('user', text);
      setLoading(true);

      // The assistant bubble is created on the first token so tokens can be
      // appended in-place; null means no bubble yet.
      let assistantBubble = null;

      function getOrCreateAssistantBubble() {
        if (assistantBubble) return assistantBubble;
        setLoading(false);
        const wrapper = document.createElement('div');
        wrapper.className = 'flex justify-start';
        assistantBubble = document.createElement('div');
        assistantBubble.className =
          'bg-gray-100 text-gray-800 rounded-2xl rounded-tl-sm px-4 py-3 max-w-[80%] text-sm leading-relaxed';
        wrapper.appendChild(assistantBubble);
        messagesEl.appendChild(wrapper);
        return assistantBubble;
      }

      try {
        const res = await fetch('/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            session_id:     sessionId,
            message:        text,
            customer_email: email,
          }),
        });

        if (!res.ok) throw new Error(`Server returned ${res.status}`);

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer    = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const blocks = buffer.split('\n\n');
          buffer = blocks.pop(); // keep the last incomplete block

          for (const block of blocks) {
            if (!block.trim()) continue;

            const lines     = block.split('\n');
            const eventLine = lines.find(l => l.startsWith('event:'));
            const dataLine  = lines.find(l => l.startsWith('data:'));
            if (!eventLine || !dataLine) continue;

            const eventType = eventLine.slice(6).trim();
            let payload;
            try { payload = JSON.parse(dataLine.slice(5).trim()); } catch { continue; }

            if (eventType === 'token') {
              getOrCreateAssistantBubble().textContent += payload.text;
              scrollToBottom();
            } else if (eventType === 'tool_call') {
              thinkingTextEl.textContent = 'Checking your order…';
            } else if (eventType === 'done') {
              sessionId = payload.session_id;
              // Fallback: if the model replied without streaming tokens (rare),
              // render the full reply from the done payload.
              if (!assistantBubble && payload.full_reply) {
                appendMessage('assistant', payload.full_reply);
              }
            }
          }
        }
      } catch {
        const wrapper = document.createElement('div');
        wrapper.className = 'flex justify-start';
        const bubble = document.createElement('div');
        bubble.className =
          'bg-red-50 text-red-600 border border-red-200 rounded-2xl rounded-tl-sm px-4 py-3 max-w-[80%] text-sm leading-relaxed';
        const resendBtn = document.createElement('button');
        resendBtn.className = 'underline font-medium ml-1';
        resendBtn.textContent = 'Resend';
        resendBtn.addEventListener('click', () => {
          wrapper.remove();
          messageInput.value = text;
          sendMessage();
        });
        bubble.append('Something went wrong. ', resendBtn);
        wrapper.appendChild(bubble);
        messagesEl.appendChild(wrapper);
        scrollToBottom();
      } finally {
        setLoading(false);
        messageInput.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>

</body>
</html>
